<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flow Field</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #05060a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #cfd6e4;
  }
  canvas { display: block; cursor: crosshair; }
  .hud {
    position: fixed;
    top: 16px;
    left: 16px;
    padding: 10px 14px;
    background: rgba(10, 14, 22, 0.55);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    font-size: 12px;
    line-height: 1.6;
    user-select: none;
    pointer-events: none;
  }
  .hud b { color: #9ad2ff; font-weight: 600; }
  .hud .k {
    display: inline-block;
    padding: 1px 6px;
    margin: 0 2px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    background: rgba(255,255,255,0.04);
    font-family: ui-monospace, Menlo, monospace;
    font-size: 11px;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud">
  <div><b>Flow Field</b> — drift with the current</div>
  <div>move mouse · click to attract · <span class="k">Space</span> burst · <span class="k">R</span> reset</div>
</div>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H;

  const PARTICLE_COUNT = 1400;
  const NOISE_SCALE = 0.0018;
  const TIME_SCALE = 0.0006;
  const SPEED = 1.4;

  // Simple value-noise-ish pseudo-field: sum of sines, cheap and smooth.
  function field(x, y, t) {
    const a = Math.sin(x * NOISE_SCALE + t)       * Math.cos(y * NOISE_SCALE * 1.3 - t * 0.7);
    const b = Math.sin((x + y) * NOISE_SCALE * 0.7 - t * 1.1);
    const c = Math.cos((x - y) * NOISE_SCALE * 1.1 + t * 0.9);
    return (a + b + c) * Math.PI; // angle
  }

  const particles = [];
  const mouse = { x: -9999, y: -9999, down: false };

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    ctx.fillStyle = '#05060a';
    ctx.fillRect(0, 0, W, H);
  }

  function spawnParticle(p) {
    p.x = Math.random() * W;
    p.y = Math.random() * H;
    p.life = 120 + Math.random() * 260;
    p.age = 0;
    p.hue = 180 + Math.random() * 120; // cyan → magenta
  }

  function init() {
    resize();
    particles.length = 0;
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const p = {};
      spawnParticle(p);
      particles.push(p);
    }
  }

  function step(t) {
    // soft fade trails
    ctx.fillStyle = 'rgba(5, 6, 10, 0.06)';
    ctx.fillRect(0, 0, W, H);

    ctx.globalCompositeOperation = 'lighter';

    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      const angle = field(p.x, p.y, t);
      let vx = Math.cos(angle) * SPEED;
      let vy = Math.sin(angle) * SPEED;

      // mouse influence
      const dx = mouse.x - p.x;
      const dy = mouse.y - p.y;
      const d2 = dx*dx + dy*dy;
      if (d2 < 40000) {
        const d = Math.sqrt(d2) + 0.01;
        const force = (mouse.down ? 2.4 : 0.9) * (1 - d / 200);
        vx += (dx / d) * force;
        vy += (dy / d) * force;
      }

      const nx = p.x + vx;
      const ny = p.y + vy;

      const alpha = 0.55 * (1 - p.age / p.life);
      ctx.strokeStyle = `hsla(${p.hue}, 90%, 62%, ${alpha})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(nx, ny);
      ctx.stroke();

      p.x = nx;
      p.y = ny;
      p.age++;

      if (p.age > p.life || p.x < -20 || p.x > W + 20 || p.y < -20 || p.y > H + 20) {
        spawnParticle(p);
      }
    }

    ctx.globalCompositeOperation = 'source-over';
  }

  function burst() {
    for (let i = 0; i < 300; i++) {
      const p = particles[Math.floor(Math.random() * particles.length)];
      p.x = mouse.x > 0 ? mouse.x : W / 2;
      p.y = mouse.y > 0 ? mouse.y : H / 2;
      p.age = 0;
      p.hue = Math.random() * 360;
    }
  }

  let t0 = performance.now();
  function loop(now) {
    const t = (now - t0) * TIME_SCALE;
    step(t);
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', resize);
  window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });
  window.addEventListener('mousedown', () => mouse.down = true);
  window.addEventListener('mouseup',   () => mouse.down = false);
  window.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); burst(); }
    if (e.key === 'r' || e.key === 'R') init();
  });

  init();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
